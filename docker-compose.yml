services:
  morpheus:
    build: .
    image: morpheus:latest
    container_name: morpheus_dev
    volumes:
      - .:/app
      - ./.cache:/root/.cache
    # Set the default shell to use the mamba environment
    command: /bin/bash -l
    stdin_open: true
    tty: true
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - DISPLAY=${DISPLAY}
      - QT_X11_NO_MITSHM=1
    network_mode: host
